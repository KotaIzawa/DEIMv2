__include__: [
  '../dataset/custom_detection.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deimv2.yml',
]

output_dir: ./outputs/deimv2_hgnetv2_pico_coco

DEIM:
  encoder: LiteEncoder
  decoder: DEIMTransformer

HGNetv2:
  name: 'Pico'
  return_idx: [2]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

LiteEncoder:
  in_channels: [512]
  feat_strides: [16]

  # intra
  hidden_dim: 112

  # cross
  expansion: 0.34
  depth_mult: 0.5
  act: 'silu'


DEIMTransformer:
  feat_channels: [112, 112]
  feat_strides: [16, 32]
  hidden_dim: 112
  num_levels: 2
  num_points: [4, 2]

  num_layers: 3
  eval_idx: -1
  num_queries: 200

  # FFN
  dim_feedforward: 320

  # New options for DEIMv2
  share_bbox_head: True
  use_gateway: False

# Increase to search for the optimal ema
epoches: 50 # 40 + 10

## Our LR-Scheduler
warmup_iter: 400
flat_epoch: 25    # epoch // 2
no_aug_epoch: 10
lr_gamma: 0.5

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.00005
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.00005
      weight_decay: 0.
    -  # not opt
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

eval_spatial_size: [640, 640]
train_dataloader:
  total_batch_size: 8
  dataset: 
    transforms:
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 8}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640], }
        - {type: SanitizeBoundingBoxes, min_size: 8}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 25, 40]   # list 
        ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
      mosaic_prob: 0.5

  collate_fn:
    mixup_prob: 0.0
    mixup_epochs: [40000, 15000]
    copyblend_prob: 0.0
    copyblend_epochs: [40000, 15000]
    stop_epoch: 40 # 40 + 10
    ema_restart_decay: 0.9999
    base_size: 640
    base_size_repeat: ~

val_dataloader:
  total_batch_size: 8
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [640, 640], }
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
  shuffle: False
  num_workers: 16


DEIMCriterion:
  losses: ['mal', 'boxes']    # , 'local'
  use_uni_set: False

  matcher:
    matcher_change_epoch: 45